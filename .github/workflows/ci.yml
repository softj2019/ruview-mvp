name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install and typecheck
        run: |
          cd apps/web-monitor
          npm install
          npm run typecheck

  build-web:
    runs-on: ubuntu-latest
    needs: lint-and-type-check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build web-monitor
        run: |
          cd apps/web-monitor
          npm install
          npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: web-monitor-dist
          path: apps/web-monitor/dist

  python-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Python dependencies
        run: |
          cd services/signal-adapter
          pip install -r requirements.txt
      - name: Verify CSIProcessor import
        run: |
          cd services/signal-adapter
          python -c "from csi_processor import CSIProcessor; print('import ok')"
      - name: Verify FastAPI app import
        run: |
          cd services/signal-adapter
          python -c "from main import app; print('app ok')"
