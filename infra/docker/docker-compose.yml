version: '3.8'

services:
  signal-adapter:
    build:
      context: ../../services/signal-adapter
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    env_file:
      - ../../.env
    restart: unless-stopped

  api-gateway:
    build:
      context: ../../apps/api-gateway
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../../.env
    depends_on:
      - signal-adapter
    restart: unless-stopped

  web-monitor:
    build:
      context: ../../apps/web-monitor
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - api-gateway
    restart: unless-stopped
