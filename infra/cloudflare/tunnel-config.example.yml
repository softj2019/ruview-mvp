# Cloudflare Tunnel Configuration
# Copy to tunnel-config.yml and update with your tunnel ID
tunnel: YOUR_TUNNEL_ID
credentials-file: /root/.cloudflared/YOUR_TUNNEL_ID.json

ingress:
  - hostname: api.dev.ruview.example.com
    service: http://localhost:8000
  - hostname: sense.dev.ruview.example.com
    service: http://localhost:8001
  - hostname: ws.dev.ruview.example.com
    service: http://localhost:8001
    originRequest:
      noTLSVerify: true
  - service: http_status:404
