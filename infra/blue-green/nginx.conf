################################################################################
# ruView — Blue-Green Nginx Configuration
#
# Blue slot  : api-gateway :8000, signal-adapter :8001
# Green slot : api-gateway :8010, signal-adapter :8011
#
# To switch active slot, edit the `upstream` blocks and run:
#   nginx -s reload
# Or use the automated deploy script:
#   ./deploy.sh
################################################################################

events {
    worker_connections 1024;
}

http {
    # ── API Gateway upstream (blue/green) ──────────────────────────────────────
    upstream api_gateway {
        server localhost:8000; # blue (active)
        # server localhost:8010; # green (standby)

        keepalive 32;
    }

    # ── Signal Adapter upstream (blue/green) ───────────────────────────────────
    upstream signal_adapter {
        server localhost:8001; # blue (active)
        # server localhost:8011; # green (standby)

        keepalive 32;
    }

    # ── Logging ────────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/ruview_access.log main;
    error_log  /var/log/nginx/ruview_error.log warn;

    # ── Main server block ──────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Health probe used by deploy.sh to confirm Nginx is up
        location /nginx-health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # REST API — proxy to api-gateway
        location /api/ {
            proxy_pass         http://api_gateway;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # WebSocket events — api-gateway
        location /ws {
            proxy_pass             http://api_gateway;
            proxy_http_version     1.1;
            proxy_set_header       Upgrade    $http_upgrade;
            proxy_set_header       Connection "upgrade";
            proxy_set_header       Host       $host;
            proxy_read_timeout     3600s;
            proxy_send_timeout     3600s;
        }

        # Signal adapter direct access (internal only)
        location /signal/ {
            proxy_pass         http://signal_adapter/;
            proxy_http_version 1.1;
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;
            proxy_read_timeout 30s;
        }

        # WebSocket — signal-adapter
        location /signal/ws {
            proxy_pass             http://signal_adapter/ws;
            proxy_http_version     1.1;
            proxy_set_header       Upgrade    $http_upgrade;
            proxy_set_header       Connection "upgrade";
            proxy_set_header       Host       $host;
            proxy_read_timeout     3600s;
        }

        # Root — fall through to api-gateway health
        location / {
            proxy_pass         http://api_gateway;
            proxy_http_version 1.1;
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;
        }
    }
}
