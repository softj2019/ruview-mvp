version: '3.8'
services:
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    volumes: ["./redis/redis.conf:/usr/local/etc/redis/redis.conf"]
    command: redis-server /usr/local/etc/redis/redis.conf
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    ports: ["9090:9090"]
    volumes: ["./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml", "./monitoring/alerting-rules.yml:/etc/prometheus/alerting-rules.yml"]
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports: ["3001:3000"]
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=ruview2026
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes: ["grafana-data:/var/lib/grafana"]
    restart: unless-stopped

volumes:
  grafana-data:
