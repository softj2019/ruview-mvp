# ruView Nginx reverse proxy
# Supports Blue-Green deployment via active-upstream.conf symlink

# Load active upstream definitions (symlinked by blue-green-deploy.sh)
# Default fallback: blue ports
include /etc/nginx/conf.d/active-upstream.conf;

upstream signal_adapter {
    server localhost:8001;
}

upstream api_gateway {
    server localhost:8000;
}

server {
    listen 80;
    server_name _;

    # Proxy timeouts
    proxy_connect_timeout   10s;
    proxy_send_timeout      60s;
    proxy_read_timeout      60s;

    # REST API
    location /api/ {
        proxy_pass         http://api_gateway;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # WebSocket (signal-adapter)
    location /ws/ {
        proxy_pass         http://signal_adapter;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_read_timeout 3600s;
    }

    # Health endpoints (direct passthrough)
    location /health {
        proxy_pass http://api_gateway;
    }
}
